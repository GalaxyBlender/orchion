name: Release Orchion Server

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  CUDA_VERSION: "13.2.0"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  test:
    name: Test release source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install web dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Test web
        working-directory: web
        run: |
          bun test
          bun run typecheck

      - name: Provision PDFium for tests
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/pdfium-linux-x64.tgz"
          curl -fsSL "https://github.com/bblanchon/pdfium-binaries/releases/download/chromium/7891/pdfium-linux-x64.tgz" -o "${archive}"
          echo "e21257c643592dc8eaf284f5f54cd7eca5e1694ff35a5b2158a351931bea107f  ${archive}" | sha256sum --check --strict
          mkdir -p "${RUNNER_TEMP}/pdfium" target/debug/deps
          tar -xzf "${archive}" -C "${RUNNER_TEMP}/pdfium" lib/libpdfium.so
          cp "${RUNNER_TEMP}/pdfium/lib/libpdfium.so" target/debug/deps/libpdfium.so

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Check client feature gates
        run: |
          cargo check -p orchion-client --no-default-features --features models
          cargo check -p orchion-client --no-default-features --features asr
          cargo check -p orchion-client --no-default-features --features tts,ocr,pdf

      - name: Assemble publishable packages
        run: |
          cargo package --workspace --no-verify \
            --exclude orchion \
            --exclude orchion-qwen3 \
            --exclude orchion-server \
            --exclude orchion-example-asr-file \
            --exclude orchion-example-asr-streaming \
            --exclude orchion-example-download-model \
            --exclude orchion-example-tts-preset

  build-macos:
    name: Build macos packages
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Metal server
        run: ./scripts/build-macos-metal.sh

      - name: Package Metal server
        shell: bash
        run: |
          set -euo pipefail
          package="orchion-server-${GITHUB_REF_NAME}-macos-aarch64-metal"
          mkdir -p "dist/${package}"
          cp "target/release/orchion-server" "dist/${package}/"
          cp "target/release/libpdfium.dylib" "dist/${package}/"
          cp "apps/orchion-server/config.toml" "dist/${package}/config.toml"
          "dist/${package}/orchion-server" --help >/dev/null
          python3 -c 'import ctypes, sys; ctypes.CDLL(sys.argv[1])' "dist/${package}/libpdfium.dylib"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"

      - name: Upload Metal package
        uses: actions/upload-artifact@v4
        with:
          name: orchion-server-${{ github.ref_name }}-macos-aarch64-metal
          path: dist/orchion-server-${{ github.ref_name }}-macos-aarch64-metal.tar.gz
          if-no-files-found: error

  build-linux:
    name: Build linux packages
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:13.2.0-devel-ubuntu24.04
    steps:
      - name: Install build prerequisites
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            libssl-dev \
            pkg-config \
            unzip
          rm -rf /var/lib/apt/lists/*

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify CUDA Toolkit
        run: nvcc --version

      - name: Build CPU server
        run: ./scripts/build-linux-cpu.sh

      - name: Package CPU server
        shell: bash
        run: |
          set -euo pipefail
          package="orchion-server-${GITHUB_REF_NAME}-linux-x86_64-cpu"
          mkdir -p "dist/${package}"
          cp "target/release/orchion-server" "dist/${package}/"
          cp "target/release/libpdfium.so" "dist/${package}/"
          cp "apps/orchion-server/config.toml" "dist/${package}/config.toml"
          "dist/${package}/orchion-server" --help >/dev/null
          python3 -c 'import ctypes, sys; ctypes.CDLL(sys.argv[1])' "dist/${package}/libpdfium.so"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"

      - name: Upload CPU package
        uses: actions/upload-artifact@v4
        with:
          name: orchion-server-${{ github.ref_name }}-linux-x86_64-cpu
          path: dist/orchion-server-${{ github.ref_name }}-linux-x86_64-cpu.tar.gz
          if-no-files-found: error

      - name: Verify CUDA Toolkit
        run: nvcc --version

      - name: Build CUDA server
        run: ./scripts/build-linux-cuda.sh

      - name: Package CUDA server
        shell: bash
        run: |
          set -euo pipefail
          package="orchion-server-${GITHUB_REF_NAME}-linux-x86_64-cuda"
          mkdir -p "dist/${package}"
          cp "target/release/orchion-server" "dist/${package}/"
          cp "target/release/libpdfium.so" "dist/${package}/"
          cp "apps/orchion-server/config.toml" "dist/${package}/config.toml"
          "dist/${package}/orchion-server" --help >/dev/null
          python3 -c 'import ctypes, sys; ctypes.CDLL(sys.argv[1])' "dist/${package}/libpdfium.so"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"

      - name: Upload CUDA package
        uses: actions/upload-artifact@v4
        with:
          name: orchion-server-${{ github.ref_name }}-linux-x86_64-cuda
          path: dist/orchion-server-${{ github.ref_name }}-linux-x86_64-cuda.tar.gz
          if-no-files-found: error

  build-windows:
    name: Build windows packages
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build CPU server
        run: .\scripts\build-windows-cpu.cmd

      - name: Package CPU server
        shell: pwsh
        run: |
          $package = "orchion-server-$env:GITHUB_REF_NAME-windows-x86_64-cpu"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item "target/release/orchion-server.exe" "dist/$package/"
          Copy-Item "target/release/pdfium.dll" "dist/$package/"
          Copy-Item "apps/orchion-server/config.toml" "dist/$package/config.toml"
          & "dist/$package/orchion-server.exe" --help | Out-Null
          $pdfium = [System.Runtime.InteropServices.NativeLibrary]::Load((Resolve-Path "dist/$package/pdfium.dll"))
          [System.Runtime.InteropServices.NativeLibrary]::Free($pdfium)
          Compress-Archive -Path "dist/$package/*" -DestinationPath "dist/$package.zip"

      - name: Upload CPU package
        uses: actions/upload-artifact@v4
        with:
          name: orchion-server-${{ github.ref_name }}-windows-x86_64-cpu
          path: dist/orchion-server-${{ github.ref_name }}-windows-x86_64-cpu.zip
          if-no-files-found: error

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          log-file-suffix: windows-x86_64-cuda.txt

      - name: Build CUDA server
        run: .\scripts\build-windows-cuda.cmd

      - name: Package CUDA server
        shell: pwsh
        run: |
          $package = "orchion-server-$env:GITHUB_REF_NAME-windows-x86_64-cuda"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item "target/release/orchion-server.exe" "dist/$package/"
          Copy-Item "target/release/pdfium.dll" "dist/$package/"
          Copy-Item "apps/orchion-server/config.toml" "dist/$package/config.toml"
          & "dist/$package/orchion-server.exe" --help | Out-Null
          $pdfium = [System.Runtime.InteropServices.NativeLibrary]::Load((Resolve-Path "dist/$package/pdfium.dll"))
          [System.Runtime.InteropServices.NativeLibrary]::Free($pdfium)
          Compress-Archive -Path "dist/$package/*" -DestinationPath "dist/$package.zip"

      - name: Upload CUDA package
        uses: actions/upload-artifact@v4
        with:
          name: orchion-server-${{ github.ref_name }}-windows-x86_64-cuda
          path: dist/orchion-server-${{ github.ref_name }}-windows-x86_64-cuda.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [test, build-macos, build-linux, build-windows]
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
