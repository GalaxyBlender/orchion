[server]
bind = "127.0.0.1:9090"
max_upload_size = "100M"

[models]
dir = "models"
source = "auto"
max_loaded = 2

[services.asr]
enabled = true
default_model = "Qwen/Qwen3-ASR-0.6B"
device = "auto"
available_models = ["Qwen/Qwen3-ASR-0.6B", "Qwen/Qwen3-ASR-1.7B"]
idle_timeout = "10m"
stream_chunk_size = 2.0
stream_target_segment = "12s"
stream_max_segment = "120s"
max_loaded = 1

[services.tts]
enabled = true
default_model = "Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice"
device = "auto"
available_models = [
  "Qwen/Qwen3-TTS-12Hz-0.6B-Base",
  "Qwen/Qwen3-TTS-12Hz-0.6B-CustomVoice",
  "Qwen/Qwen3-TTS-12Hz-1.7B-Base",
  "Qwen/Qwen3-TTS-12Hz-1.7B-CustomVoice",
  "Qwen/Qwen3-TTS-12Hz-1.7B-VoiceDesign",
]
idle_timeout = "10m"
max_loaded = 1
format = "wav"

[services.ocr]
enabled = true
default_model = "PaddlePaddle/PP-OCRv6_tiny"
available_models = [
  "PaddlePaddle/PP-OCRv5_mobile",
  "PaddlePaddle/PP-OCRv5_server",
  "PaddlePaddle/PP-OCRv6_tiny",
  "PaddlePaddle/PP-OCRv6_small",
  "PaddlePaddle/PP-OCRv6_medium"
]
layout_default_model = "PaddlePaddle/PP-DocLayoutV3"
layout_available_models = ["PaddlePaddle/PP-DocLayoutV3"]
device = "auto"
idle_timeout = "10m"
max_loaded = 1
format = "json"

[services.ocr-vl]
enabled = true
default_model = "PaddlePaddle/PaddleOCR-VL-1.6"
available_models = [
  "PaddlePaddle/PaddleOCR-VL-1.5",
  "PaddlePaddle/PaddleOCR-VL-1.6",
]
layout_default_model = "PaddlePaddle/PP-DocLayoutV3"
layout_available_models = ["PaddlePaddle/PP-DocLayoutV3"]
device = "auto"
idle_timeout = "10m"
max_loaded = 1
format = "markdown"

[auth]
# api_key = "change-me"
