[server]
bind = "127.0.0.1:9090"
max_upload_size = "30M"

[models]
dir = "models"
source = "auto"
max_loaded = 2

[services.asr]
enabled = true
default_model = "qwen3-asr-0.6b"
device = "auto"
available_models = ["qwen3-asr-0.6b", "qwen3-asr-1.7b"]
idle_timeout = "10m"
max_loaded = 1

[services.tts]
enabled = true
default_model = "qwen3-tts-0.6b-custom-voice"
device = "auto"
available_models = [
  "qwen3-tts-0.6b-base",
  "qwen3-tts-0.6b-custom-voice",
  "qwen3-tts-1.7b-base",
  "qwen3-tts-1.7b-custom-voice",
  "qwen3-tts-1.7b-voice-design",
]
idle_timeout = "10m"
max_loaded = 1
format = "wav"

[auth]
# api_key = "change-me"
